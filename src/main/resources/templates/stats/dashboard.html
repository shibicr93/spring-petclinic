<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'stats')}">

<head>
    <style>
        .stat-card {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.25rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .stat-card h3 {
            color: #495057;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #007bff;
        }
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
            margin: 2rem 0;
            padding: 1rem;
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chart-container canvas {
            max-height: 400px;
            max-width: 100%;
        }
        .error-message {
            color: #dc3545;
            padding: 1rem;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 0.25rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <h2 th:text="#{statisticsDashboard}">Statistics Dashboard</h2>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <!-- Summary Statistics -->
    <div class="row">
        <h3 th:text="#{summaryStatistics}">Summary Statistics</h3>
        <div class="col-md-3">
            <div class="stat-card">
                <h3 th:text="#{totalPets}">Total Pets</h3>
                <div class="stat-value" th:text="${summary.totalPets}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <h3 th:text="#{totalOwners}">Total Owners</h3>
                <div class="stat-value" th:text="${summary.totalOwners}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <h3 th:text="#{totalVisits}">Total Visits</h3>
                <div class="stat-value" th:text="${summary.totalVisits}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <h3 th:text="#{totalVets}">Total Vets</h3>
                <div class="stat-value" th:text="${summary.totalVets}">0</div>
            </div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="row" th:if="${not #lists.isEmpty(petsByType) or not #lists.isEmpty(visitsByMonth)}">
        <!-- Pets by Type Chart -->
        <div class="col-md-6" th:if="${not #lists.isEmpty(petsByType)}">
            <h3 th:text="#{petsByType}">Pets by Type</h3>
            <div class="chart-container">
                <canvas id="petTypeChart"></canvas>
            </div>
        </div>

        <!-- Visits by Month Chart (shown next to Pets chart on medium+ screens) -->
        <div class="col-md-6" th:if="${not #lists.isEmpty(visitsByMonth)}" th:data-year="${year}">
            <h3 th:text="#{visitsByMonth} + ' (' + ${year} + ')'" >Visits by Month</h3>
            <div class="chart-container">
                <canvas id="visitMonthChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Visits by Month Chart (fallback for smaller screens or when only this chart exists) -->
    <div class="row" th:if="${#lists.isEmpty(petsByType) and not #lists.isEmpty(visitsByMonth)}">
        <div class="col-md-12" th:data-year="${year}">
            <h3 th:text="#{visitsByMonth} + ' (' + ${year} + ')'" >Visits by Month</h3>
            <div class="chart-container">
                <canvas id="visitMonthChart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script>
        // Initialize charts after DOM is fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            initializePetsChart();
            initializeVisitsChart();
        });

        function initializePetsChart() {
            // Fetch pet type data from API
            fetch('/api/stats/pets-by-type')
                .then(response => response.json())
                .then(petsByType => {
                    if (petsByType && petsByType.length > 0) {
                        const petCanvasElement = document.getElementById('petTypeChart');
                        if (petCanvasElement) {
                            const petCtx = petCanvasElement.getContext('2d');
                            new Chart(petCtx, {
                                type: 'bar',
                                data: {
                                    labels: petsByType.map(p => p.type),
                                    datasets: [{
                                        label: 'Number of Pets',
                                        data: petsByType.map(p => p.count),
                                        backgroundColor: [
                                            'rgba(0, 123, 255, 0.8)',
                                            'rgba(40, 167, 69, 0.8)',
                                            'rgba(255, 193, 7, 0.8)',
                                            'rgba(220, 53, 69, 0.8)',
                                            'rgba(23, 162, 184, 0.8)',
                                            'rgba(253, 126, 20, 0.8)'
                                        ],
                                        borderColor: '#333',
                                        borderWidth: 2
                                    }]
                                },
                                options: {
                                    indexAxis: 'x',
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            display: true,
                                            position: 'top'
                                        }
                                    },
                                    scales: {
                                        y: {
                                            beginAtZero: true,
                                            ticks: {
                                                stepSize: 1
                                            }
                                        }
                                    }
                                }
                            });
                            console.log('Pet Type chart initialized with ' + petsByType.length + ' data points');
                        }
                    }
                })
                .catch(error => {
                    console.error('Error loading pets chart:', error);
                });
        }

        function initializeVisitsChart() {
            // Get year from data attribute or use current year
            const yearElement = document.querySelector('[data-year]');
            const year = yearElement ? yearElement.getAttribute('data-year') : new Date().getFullYear();
            
            // Fetch visit data from API
            fetch('/api/stats/visits-by-month?year=' + year)
                .then(response => response.json())
                .then(visitsByMonth => {
                    if (visitsByMonth && visitsByMonth.length > 0) {
                        const visitCanvasElement = document.getElementById('visitMonthChart');
                        if (visitCanvasElement) {
                            const visitCtx = visitCanvasElement.getContext('2d');
                            new Chart(visitCtx, {
                                type: 'line',
                                data: {
                                    labels: visitsByMonth.map(v => v.month),
                                    datasets: [{
                                        label: 'Monthly Visits',
                                        data: visitsByMonth.map(v => v.count),
                                        borderColor: '#dc3545',
                                        backgroundColor: 'rgba(220, 53, 69, 0.15)',
                                        borderWidth: 3,
                                        fill: true,
                                        tension: 0.4,
                                        pointRadius: 5,
                                        pointBackgroundColor: '#dc3545',
                                        pointBorderColor: '#fff',
                                        pointBorderWidth: 2
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            display: true,
                                            position: 'top'
                                        }
                                    },
                                    scales: {
                                        y: {
                                            beginAtZero: true,
                                            ticks: {
                                                stepSize: 1
                                            }
                                        }
                                    }
                                }
                            });
                            console.log('Visit Month chart initialized with ' + visitsByMonth.length + ' data points');
                        }
                    }
                })
                .catch(error => {
                    console.error('Error loading visits chart:', error);
                });
        }
    </script>

</body>

</html>
